# Source: llm-service/templates/configmap.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: vllm-chat-templates
data:
  tool_chat_template_llama3.2_json.jinja: |-
    {{- bos_token }}
    {%- if custom_tools is defined %}
        {%- set tools = custom_tools %}
    {%- endif %}
    {%- if not tools_in_user_message is defined %}
        {%- set tools_in_user_message = false %}
    {%- endif %}
    {%- if not date_string is defined %}
        {%- if strftime_now is defined %}
            {%- set date_string = strftime_now("%d %b %Y") %}
        {%- else %}
            {%- set date_string = "26 Jul 2024" %}
        {%- endif %}
    {%- endif %}
    {%- if not tools is defined %}
        {%- set tools = none %}
    {%- endif %}
    
    {#- Find out if there are any images #}
    {% set image_ns = namespace(has_images=false) %}
    {%- for message in messages %}
        {%- for content in message['content'] %}
            {%- if content['type'] == 'image' %}
                {%- set image_ns.has_images = true %}
            {%- endif %}
        {%- endfor %}
    {%- endfor %}
    
    {#- This block extracts the system message, so we can slot it into the right place. #}
    {%- if messages[0]['role'] == 'system' %}
        {%- if messages[0]['content'] is string %}
            {%- set system_message = messages[0]['content']|trim %}
        {%- else %}
            {%- set system_message = messages[0]['content'][0]['text']|trim %}
        {%- endif %}
        {%- set messages = messages[1:] %}
    {%- else %}
        {%- if tools is not none %}
            {%- set system_message = "You are a helpful assistant with tool calling capabilities. Only reply with a tool call if the function exists in the library provided by the user. If it doesn't exist, just reply directly in natural language. When you receive a tool call response, use the output to format an answer to the original user question." %}
        {%- else %}
            {%- set system_message = "" %}
        {%- endif %}
    {%- endif %}
    
    {#- System message if there are no images, if the user supplied one, or if tools are used (default tool system message) #}
    {%- if system_message or not image_ns.has_images %}
        {{- "<|start_header_id|>system<|end_header_id|>\n\n" }}
        {%- if tools is not none %}
            {{- "Environment: ipython\n" }}
        {%- endif %}
        {{- "Cutting Knowledge Date: December 2023\n" }}
        {{- "Today Date: " + date_string + "\n\n" }}
        {%- if tools is not none and not tools_in_user_message %}
            {{- "You have access to the following functions. To call a function, please respond with JSON for a function call. " }}
            {{- 'Respond in the format {"name": function name, "parameters": dictionary of argument name and its value}. ' }}
            {{- "Do not use variables.\n\n" }}
            {%- for t in tools %}
                {{- t | tojson(indent=4) }}
                {{- "\n\n" }}
            {%- endfor %}
        {%- endif %}
        {{- system_message }}
        {{- "<|eot_id|>" }}
    {%- endif %}
    
    {#- Custom tools are passed in a user message with some extra guidance #}
    {%- if tools_in_user_message and not tools is none %}
        {#- Extract the first user message so we can plug it in here #}
        {%- if messages | length != 0 %}
            {%- if messages[0]['content'] is string %}
                {%- set first_user_message = messages[0]['content']|trim %}
            {%- else %}
                {%- set first_user_message = messages[0]['content'] | selectattr('type', 'equalto', 'text') | map(attribute='text') | map('trim') | join('\n') %}
            {%- endif %}
            {%- set messages = messages[1:] %}
        {%- else %}
            {{- raise_exception("Cannot put tools in the first user message when there's no first user message!") }}
        {%- endif %}
        {{- '<|start_header_id|>user<|end_header_id|>\n\n' -}}
        {{- "Given the following functions, please respond with a JSON for a function call " }}
        {{- "with its proper arguments that best answers the given prompt.\n\n" }}
        {{- 'Respond in the format {"name": function name, "parameters": dictionary of argument name and its value}. ' }}
        {{- "Do not use variables.\n\n" }}
        {%- for t in tools %}
            {{- t | tojson(indent=4) }}
            {{- "\n\n" }}
        {%- endfor %}
        {{- first_user_message + "<|eot_id|>"}}
    {%- endif %}
    
    {%- for message in messages %}
        {%- if not (message.role == 'ipython' or message.role == 'tool' or 'tool_calls' in message) %}
            {{- '<|start_header_id|>' + message['role'] + '<|end_header_id|>\n\n' }}
            {%- if message['content'] is string %}
                {{- message['content'] | trim}}
            {%- else %}
                {%- for content in message['content'] %}
                    {%- if content['type'] == 'image' %}
                        {{- '<|image|>' }}
                    {%- elif content['type'] == 'text' %}
                        {{- content['text'] | trim }}
                    {%- endif %}
                {%- endfor %}
            {%- endif %}
            {{- '<|eot_id|>' }}
        {%- elif 'tool_calls' in message %}
            {%- if not message.tool_calls|length == 1 %}
                {{- raise_exception("This model only supports single tool-calls at once!") }}
            {%- endif %}
            {%- set tool_call = message.tool_calls[0].function %}
            {{- '<|start_header_id|>assistant<|end_header_id|>\n\n' -}}
            {{- '{"name": "' + tool_call.name + '", ' }}
            {{- '"parameters": ' }}
            {{- tool_call.arguments | tojson }}
            {{- "}" }}
            {{- "<|eot_id|>" }}
        {%- elif message.role == "tool" or message.role == "ipython" %}
            {{- "<|start_header_id|>ipython<|end_header_id|>\n\n" }}
            {%- if message.content is string %}
                {{- { "output": message.content } | tojson }}
            {%- else %}
                {%- for content in message['content']  %}
                    {%- if content['type']  == 'text' %}
                        {{- { "output": content['text']  } | tojson }}
                    {%- endif %}
                {%- endfor %}
            {%- endif %}
            {{- "<|eot_id|>" }}
        {%- endif %}
    {%- endfor %}
    {%- if add_generation_prompt %}
        {{- '<|start_header_id|>assistant<|end_header_id|>\n\n' }}
    {%- endif %}
    
  tool_chat_template_llama3.2_pythonic.jinja: |-
    {{- bos_token }}
    {%- if custom_tools is defined %}
        {%- set tools = custom_tools %}
    {%- endif %}
    {%- if not tools_in_user_message is defined %}
        {%- set tools_in_user_message = false %}
    {%- endif %}
    {%- if not date_string is defined %}
        {%- if strftime_now is defined %}
            {%- set date_string = strftime_now("%d %b %Y") %}
        {%- else %}
            {%- set date_string = "26 Jul 2024" %}
        {%- endif %}
    {%- endif %}
    {%- if not tools is defined %}
        {%- set tools = none %}
    {%- endif %}
    
    {#- This block extracts the system message, so we can slot it into the right place. #}
    {%- if messages[0]['role'] == 'system' %}
        {%- set system_message = messages[0]['content']|trim %}
        {%- set messages = messages[1:] %}
    {%- else %}
        {%- set system_message = "You are a helpful assistant with tool calling capabilities. Only reply with a tool call if the function exists in the library provided by the user. If it doesn't exist, just reply directly in natural language. When you receive a tool call response, use the output to format an answer to the original user question." %}
    {%- endif %}
    
    {#- System message #}
    {{- "<|start_header_id|>system<|end_header_id|>\n\n" }}
    {%- if tools is not none %}
        {{- "Environment: ipython\n" }}
    {%- endif %}
    {{- "Cutting Knowledge Date: December 2023\n" }}
    {{- "Today Date: " + date_string + "\n\n" }}
    {%- if tools is not none and not tools_in_user_message %}
        {{- "You have access to the following functions. To call functions, please respond with a python list of the calls. " }}
        {{- 'Respond in the format [func_name1(params_name1=params_value1, params_name2=params_value2...), func_name2(params)] ' }}
        {{- "Do not use variables.\n\n" }}
        {%- for t in tools %}
            {{- t | tojson(indent=4) }}
            {{- "\n\n" }}
        {%- endfor %}
    {%- endif %}
    {{- system_message }}
    {{- "<|eot_id|>" }}
    
    {#- Custom tools are passed in a user message with some extra guidance #}
    {%- if tools_in_user_message and not tools is none %}
        {#- Extract the first user message so we can plug it in here #}
        {%- if messages | length != 0 %}
            {%- set first_user_message = messages[0]['content']|trim %}
            {%- set messages = messages[1:] %}
        {%- else %}
            {{- raise_exception("Cannot put tools in the first user message when there's no first user message!") }}
        {%- endif %}
        {{- '<|start_header_id|>user<|end_header_id|>\n\n' -}}
        {{- "Given the following functions, please respond with a python list for function calls " }}
        {{- "with their proper arguments to best answer the given prompt.\n\n" }}
        {{- 'Respond in the format [func_name1(params_name1=params_value1, params_name2=params_value2...), func_name2(params)] ' }}
        {{- "Do not use variables.\n\n" }}
        {%- for t in tools %}
            {{- t | tojson(indent=4) }}
            {{- "\n\n" }}
        {%- endfor %}
        {{- first_user_message + "<|eot_id|>"}}
    {%- endif %}
    
    {%- for message in messages %}
        {%- if not (message.role == 'ipython' or message.role == 'tool' or 'tool_calls' in message) %}
            {{- '<|start_header_id|>' + message['role'] + '<|end_header_id|>\n\n'+ message['content'] | trim + '<|eot_id|>' }}
        {%- elif 'tool_calls' in message %}
            {{- '<|start_header_id|>assistant<|end_header_id|>\n\n[' -}}
            {%- for tool_call in message.tool_calls %}
                {%- if tool_call.function is defined %}
                    {%- set tool_call = tool_call.function %}
                {%- endif %}
                {{- tool_call.name + '(' -}}
                {%- for param in tool_call.arguments %}
                    {{- param + '=' -}}
                    {{- "%s" | format(tool_call.arguments[param]) -}}
                    {% if not loop.last %}, {% endif %}
                {%- endfor %}
                {{- ')' -}}
                {% if not loop.last %}, {% endif %}
            {%- endfor %}
            {{- ']<|eot_id|>' -}}
        {%- elif message.role == "tool" or message.role == "ipython" %}
            {{- "<|start_header_id|>ipython<|end_header_id|>\n\n" }}
            {%- if message.content is mapping %}
                {{- message.content | tojson }}
            {%- else %}
                {{- { "output": message.content } | tojson }}
            {%- endif %}
            {{- "<|eot_id|>" }}
        {%- endif %}
    {%- endfor %}
    {%- if add_generation_prompt %}
        {{- '<|start_header_id|>assistant<|end_header_id|>\n\n' }}
    {%- endif %}
    
  tool_chat_template_qwen.jinja: |-
    {%- set image_count = namespace(value=0) -%}
    {%- set video_count = namespace(value=0) -%}
    {%- for message in messages -%}
    	{%- if loop.first and message["role"] != "system" -%}
    		{{- "<|im_start|>system\nYou are a helpful assistant.<|im_end|>\n" -}}
    	{%- endif -%}
    	{{- "<|im_start|>" -}}
    	{{- message["role"] -}}
    	{{- "\n" -}}
    	{%- if message["content"] is string -%}
    		{{- message["content"] -}}
    		{{- "<|im_end|>\n" -}}
    	{%- else -%}
    		{%- for content in message["content"] -%}
    			{%- if content["type"] == "image" or "image" in content or "image_url" in content -%}
    				{%- set image_count.value = image_count.value + 1 -%}
    				{%- if add_vision_id -%}
    					{{- "Picture " -}}
    					{{- image_count.value -}}
    					{{- ": " -}}
    				{%- endif -%}
    				{{- "<|vision_start|><|image_pad|><|vision_end|>" -}}
    			{%- elif content["type"] == "video" or "video" in content -%}
    				{%- set video_count.value = video_count.value + 1 -%}
    				{%- if add_vision_id -%}
    					{{- "Video " -}}
    					{{- video_count.value -}}
    					{{- ": " -}}
    				{%- endif -%}
    				{{- "<|vision_start|><|video_pad|><|vision_end|>" -}}
    			{%- elif "text" in content -%}
    				{{- content["text"] -}}
    			{%- endif -%}
    		{%- endfor -%}
    		{{- "<|im_end|>\n" -}}
    	{%- endif -%}
    {%- endfor -%}
    {%- if add_generation_prompt -%}
    	{{- "<|im_start|>assistant\n" -}}
    {%- endif -%}
---
# Source: llm-service/templates/vllm-service.yaml
apiVersion: v1
kind: Service
metadata:
  name: llama-3-2-3b-instruct-vllm
  labels:
    app: llama-3-2-3b-instruct-vllm
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: isvc.llama-3-2-3b-instruct-predictor
---
# Source: llm-service/templates/inference-service.yaml
apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: llama-3-2-3b-instruct
  annotations:
    openshift.io/display-name: llama-3-2-3b-instruct
    serving.knative.openshift.io/enablePassthrough: "true"
    sidecar.istio.io/inject: "true"
    sidecar.istio.io/rewriteAppHTTPProbers: "true"
    serving.kserve.io/deploymentMode: RawDeployment
  labels:
    opendatahub.io/dashboard: "true"
    networking.knative.dev/visibility: "cluster-local"
    device: gpu
spec:
  predictor:
    maxReplicas: 1
    minReplicas: 1
    model:
      modelFormat:
        name: vLLM
      name: ""
      resources:
        limits:
          cpu: "2"
          memory: 32Gi
          nvidia.com/gpu: "1"
        requests:
          cpu: "1"
          memory: 16Gi
          nvidia.com/gpu: "1"
      runtime: vllm-serving-runtime-gpu
      args:
      - --model
      - meta-llama/Llama-3.2-3B-Instruct
      - --served-model-name
      - meta-llama/Llama-3.2-3B-Instruct
      - --enable-auto-tool-choice
      - --chat-template
      - /chat-templates/tool_chat_template_llama3.2_json.jinja
      - --tool-call-parser
      - llama3_json
      - --max-model-len
      - "14336"
      - --max-num-seqs
      - "32"
    tolerations:
    - effect: NoSchedule
      key: nvidia.com/gpu
      operator: Exists
---
# Source: llm-service/templates/serving-runtime.yaml
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  name: vllm-serving-runtime-gpu
  annotations:
    openshift.io/display-name: vllm-serving-runtime-gpu
    opendatahub.io/recommended-accelerators: '["nvidia.com/gpu"]'
    opendatahub.io/apiProtocol: REST
    opendatahub.io/template-display-name: vLLM ServingRuntime for KServe (GPU)
    opendatahub.io/template-name: vllm-runtime-gpu
  labels:
    opendatahub.io/dashboard: "true"
    device: gpu
spec:
  annotations:
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
    serving.knative.dev/progress-deadline: 60m
  containers:
  - command:
    - python3
    - -m
    - vllm.entrypoints.openai.api_server
    args:
    - --port
    - "8080"
    - --download-dir
    - /vllm/model
    env:
    - name: HOME
      value: /vllm
    - name: HF_HUB_OFFLINE
      value: "0"
    - name: VLLM_SKIP_WARMUP
      value: "true"
    - name: HF_TOKEN
      valueFrom:
        secretKeyRef:
          key: HF_TOKEN
          name: huggingface-secret
    image: vllm/vllm-openai:v0.10.2
    name: kserve-container
    ports:
    - containerPort: 8080
      protocol: TCP
    volumeMounts:
    - mountPath: /dev/shm
      name: shm
    - mountPath: /chat-templates
      name: vllm-chat-templates
    - mountPath: /vllm
      name: vllm-home
  multiModel: false
  supportedModelFormats:
  - autoSelect: true
    name: vLLM
  volumes:
    - emptyDir:
        medium: Memory
        sizeLimit: 2Gi
      name: shm
    - configMap:
        name: vllm-chat-templates
      name: vllm-chat-templates
    - emptyDir: {}
      name: vllm-home
